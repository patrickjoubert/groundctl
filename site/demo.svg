<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'Berkeley Mono','IBM Plex Mono','Fira Code',ui-monospace,monospace" font-size="13">
  <defs>
    <style>
      .bg    { fill: #0a0a0a; }
      .tb    { fill: #111; stroke: #222; stroke-width: 1; }
      .bar   { fill: #1a1a1a; }
      .dot-r { fill: #f87171; } .dot-y { fill: #facc15; } .dot-g { fill: #4ade80; }
      .prompt { fill: #666; }
      .cmd    { fill: #e0e0e0; }
      .dim    { fill: #666; }
      .green  { fill: #4ade80; }
      .yellow { fill: #facc15; }
      .blue   { fill: #60a5fa; }
      .white  { fill: #ffffff; }
      .mid    { fill: #999; }

      /* typing animations */
      @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
      .cursor { animation: blink 1s infinite; fill: #e0e0e0; }

      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      .line1  { opacity:0; animation: fadeIn 0.1s 0.5s forwards; }
      .line2  { opacity:0; animation: fadeIn 0.1s 1.2s forwards; }
      .line3  { opacity:0; animation: fadeIn 0.1s 1.4s forwards; }
      .line4  { opacity:0; animation: fadeIn 0.1s 1.6s forwards; }
      .line5  { opacity:0; animation: fadeIn 0.1s 1.8s forwards; }
      .line6  { opacity:0; animation: fadeIn 0.1s 2.0s forwards; }
      .line7  { opacity:0; animation: fadeIn 0.1s 2.2s forwards; }
      .line8  { opacity:0; animation: fadeIn 0.1s 2.4s forwards; }
      .line9  { opacity:0; animation: fadeIn 0.1s 2.8s forwards; }
      .line10 { opacity:0; animation: fadeIn 0.1s 3.0s forwards; }
      .line11 { opacity:0; animation: fadeIn 0.1s 3.2s forwards; }
      .line12 { opacity:0; animation: fadeIn 0.1s 3.4s forwards; }
      .line13 { opacity:0; animation: fadeIn 0.1s 3.6s forwards; }
      .line14 { opacity:0; animation: fadeIn 0.1s 4.0s forwards; }
      .line15 { opacity:0; animation: fadeIn 0.1s 4.2s forwards; }
      .line16 { opacity:0; animation: fadeIn 0.1s 4.4s forwards; }
      .line17 { opacity:0; animation: fadeIn 0.1s 4.6s forwards; }
      .line18 { opacity:0; animation: fadeIn 0.1s 4.8s forwards; }
      .line19 { opacity:0; animation: fadeIn 0.1s 5.0s forwards; }
    </style>
  </defs>

  <!-- window bg -->
  <rect width="720" height="420" rx="10" class="bg"/>

  <!-- title bar -->
  <rect width="720" height="36" rx="10" class="bar"/>
  <rect y="26" width="720" height="10" class="bar"/>
  <circle cx="20" cy="18" r="6" class="dot-r"/>
  <circle cx="40" cy="18" r="6" class="dot-y"/>
  <circle cx="60" cy="18" r="6" class="dot-g"/>
  <text x="360" y="23" text-anchor="middle" fill="#555" font-size="12">groundctl — evspec.io</text>

  <!-- terminal content -->
  <g transform="translate(24,58)">

    <!-- $ groundctl status -->
    <text class="line1">
      <tspan class="prompt">$ </tspan><tspan class="cmd">groundctl status</tspan>
    </text>

    <text y="22" class="line2">
      <tspan class="white" font-weight="bold">evspec.io</tspan>
      <tspan class="mid"> — 70% implemented</tspan>
    </text>

    <text y="44" class="line3">
      <tspan class="mid">Features  </tspan>
      <tspan class="green">████████████████</tspan>
      <tspan fill="#2a2a2a">░░░░</tspan>
      <tspan class="mid">  11/16 done</tspan>
    </text>

    <text y="72" class="line4">
      <tspan class="mid">Available:</tspan>
    </text>
    <text y="90" class="line5">
      <tspan fill="#444">  ○ </tspan><tspan class="cmd">markets-de</tspan><tspan class="yellow">  (high)</tspan>
    </text>
    <text y="107" class="line6">
      <tspan fill="#444">  ○ </tspan><tspan class="cmd">oem-enrichment</tspan><tspan class="mid">  (medium)</tspan>
    </text>

    <!-- $ groundctl claim markets-de -->
    <text y="135" class="line7">
      <tspan class="prompt">$ </tspan><tspan class="cmd">groundctl claim markets-de --session agent-1</tspan>
    </text>
    <text y="153" class="green line8">  ✓ Claimed "markets-de" → session agent-1</text>

    <!-- parallel claim attempt -->
    <text y="175" class="line9">
      <tspan class="prompt">$ </tspan><tspan class="cmd">groundctl claim markets-de --session agent-2</tspan>
    </text>
    <text y="193" fill="#f87171" class="line10">  Feature "markets-de" already claimed by agent-1</text>
    <text y="211" class="mid line11">  Available instead:  <tspan class="cmd">markets-fr  ·  markets-nl</tspan></text>

    <!-- complete -->
    <text y="239" class="line12">
      <tspan class="prompt">$ </tspan><tspan class="cmd">groundctl complete markets-de</tspan>
    </text>
    <text y="257" class="green line13">  ✓ Completed "markets-de"</text>

    <!-- health -->
    <text y="279" class="line14">
      <tspan class="prompt">$ </tspan><tspan class="cmd">groundctl health</tspan>
    </text>
    <text y="297" class="white line15">  evspec.io — Health Score: <tspan class="yellow">58/100</tspan></text>
    <text y="313" class="line16">
      <tspan class="green">  ✅ </tspan><tspan class="mid">Features  11/16  </tspan><tspan class="green">(69%)</tspan>
    </text>
    <text y="329" class="line17">
      <tspan fill="#f87171">  ⚠  </tspan><tspan class="mid">Tests     0 files</tspan><tspan fill="#f87171">  (-20pts)</tspan>
    </text>
    <text y="345" class="line18">
      <tspan class="green">  ✅ </tspan><tspan class="mid">Decisions 4 documented</tspan>
    </text>

    <!-- cursor -->
    <text y="370" class="line19">
      <tspan class="prompt">$ </tspan><tspan class="cursor">█</tspan>
    </text>

  </g>
</svg>
